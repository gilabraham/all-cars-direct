[theme]
primaryColor = "#2E8BFF"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f7fb"
textColor = "#1c2333"
font = "sans serif"

[server]
# Don't set `port` here — Streamlit Cloud requires the default 8501 for its
# health check. For local dev, pass --server.port 8530 on the CLI to avoid
# collisions with other Streamlit apps.
runOnSave = true

[browser]
gatherUsageStats = false
